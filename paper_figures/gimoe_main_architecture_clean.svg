     </text>
    </g>
   </g>
   <g id="text_8">
    <text style="fill: #222222; font: 700 8.7px 'DejaVu Sans'" transform="translate(409.660617 163.53253)">Penalty-keyed</text>
    <text style="fill: #222222; font: 700 8.7px 'DejaVu Sans'" transform="translate(404.711133 173.210383)">residual experts</text>
    <!-- $E_{c,p}(X,\hat{Y}^{base})$ -->
    <g style="fill: #222222" transform="translate(417.9195 186.312311)">
     <text>
      <tspan style="font: oblique 8.7px 'DejaVu Sans'" x="0 19.437384 29.842871" y="-0.49062499999999964">EXY</tspan>
