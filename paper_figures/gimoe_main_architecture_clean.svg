   <g id="text_1">
    <text style="font: 700 12px 'DejaVu Sans'; text-anchor: start" x="32.1984" y="24.49728" transform="rotate(-0 32.1984 24.49728)">Main forecasting framework</text>
   </g>
   <g id="text_2">
    <text style="fill: #555555; font: 8.6px 'DejaVu Sans'; text-anchor: start" x="32.1984" y="34.58736" transform="rotate(-0 32.1984 34.58736)">GIMoE organizes base forecasting and structured residual correction around train-only channel clusters.</text>
   </g>
   <g id="text_3">
    <text style="fill: #222222; font: 700 9px 'DejaVu Sans'" transform="translate(38.427441 98.406408)">Input window</text>
    <!-- $X_{t-L:t}$ -->
    <g style="fill: #222222" transform="translate(59.2308 108.347667)">
     <text>
      <tspan style="font: oblique 9px 'DejaVu Sans'" x="0" y="-0.4375">X</tspan>
      <tspan style="font: oblique 6.3px 'DejaVu Sans'" x="6.165527 16.369189 24.456445" y="1.0390625">tLt</tspan>
      <tspan style="font: 6.3px 'DejaVu Sans'" x="9.863086 21.106494" y="1.0390625">−:</tspan>
     </text>
    </g>
   </g>
   <g id="text_4">
    <text style="fill: #222222; font: 700 9px 'DejaVu Sans'" transform="translate(161.644191 93.400622)">Channel</text>
    <text style="fill: #222222; font: 700 9px 'DejaVu Sans'" transform="translate(156.70755 103.341881)">clustering</text>
    <!-- $c_i$ -->
    <g style="fill: #222222" transform="translate(178.6788 113.353453)">
     <text>
      <tspan style="font: oblique 9px 'DejaVu Sans'" x="0" y="-0.953125">c</tspan>
      <tspan style="font: oblique 6.3px 'DejaVu Sans'" x="4.948242" y="0.5234375">i</tspan>
     </text>
    </g>
   </g>
   <g id="text_5">
    <text style="fill: #222222; font: 700 9px 'DejaVu Sans'" transform="translate(274.786537 92.733862)">Cluster-aware</text>
    <text style="fill: #222222; font: 700 9px 'DejaVu Sans'" transform="translate(273.365522 102.675122)">base predictor</text>
    <!-- $\hat{Y}^{base}$ -->
    <g style="fill: #222222" transform="translate(299.8656 114.020212)">
     <text>
      <tspan style="font: 9px 'DejaVu Sans'" x="6.03064" y="-2.796875">̂</tspan>
      <tspan style="font: oblique 9px 'DejaVu Sans'" x="0" y="-0.15625">Y</tspan>
      <tspan style="font: oblique 6.3px 'DejaVu Sans'" x="5.583691 9.582715 13.443311 16.725586" y="-3.6015625">base</tspan>
     </text>
    </g>
   </g>
   <g id="text_6">
    <text style="fill: #222222; font: 700 9.2px 'DejaVu Sans'" transform="translate(509.891619 97.633623)">Forecast</text>
