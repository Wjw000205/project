    </g>
   </g>
   <g id="text_9">
    <text style="fill: #222222; font: 700 8px 'DejaVu Sans'" transform="translate(406.59695 89.490762)">Residual</text>
    <text style="fill: #222222; font: 700 8px 'DejaVu Sans'" transform="translate(411.9882 98.327438)">fusion</text>
    <!-- $\hat{Y}^{base}+\sum_p g_p\alpha_p\Delta_p$ -->
    <g style="fill: #222222" transform="translate(394.4832 110.375187)">
     <text>
      <tspan style="font: 8px 'DejaVu Sans'" x="5.47168 20.089844 53.5" y="-2.59375 -0.25 -0.25">̂+Δ</tspan>
