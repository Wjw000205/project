# =============================================================================
# GI-MoE Loss — Final Best Configuration on ETTm1 H=96
# =============================================================================
# Validated finding: hidden_block_gi_moe_loss test_mse ≈ 0.297 vs base 0.302.
# This config is the result of a long ablation chain — DO NOT change individual
# knobs without re-validating the whole chain.
#
# Design rationale (each line below is a deliberate choice):
#
# Penalty pool: [delta, direction, trend]
#   - 3-penalty is the sweet spot (probe-driven: rel_gap 0.89/0.87/0.82).
#   - 2-pen [delta, trend] gives 0.306 (too few); 4-pen [+d2_match] gives 0.299
#     (over-saturated). 3 covers diverse failure modes with minimal cross-talk.
#   - Removed jitter/smooth (probe showed reverse-direction supervision on ETTm1).
#
# lambda_p={1,1,1}, no normalization:
#   - W0 baseline. Each penalty's RAW magnitude (delta≈0.05, direction≈0.05,
#     trend≈0.37) acts as natural curriculum — bigger raw value means bigger
#     supervision pressure while base is far, automatically eases as base
#     improves. EMA normalization destroys this curriculum.
#   - Manual lambda_p down-weighting (e.g. direction=0.3) does NOT help further
#     because gate already auto-routes — explicit weights are redundant.
#
# lambda_gate_bimodal=0.01 (G3 bimodal entropy reg):
#   - Pushes gate values toward 0 or 1, sharpening per-sample selectivity.
#   - Empirically contributes ~0.007 improvement (0.304 → 0.297).
#   - WARNING: G3 is sensitive to lambda_p deviations — any change to lambda_p
#     can cause gate collapse to 0. Treat G3 + lambda_p={1,1,1} as a coupled
#     pair; don't tune one without re-validating with the other.
#
# v2 hidden-block + B1 fix: head does NOT produce its own y_base. y_base comes
# from base.decode(h) directly. Without this fix, head's internal BaseHead is
# weak (0.55) and branches compensate (wrong design).
#
# v2 gate shape [B,C,1] per-sample scalar (B2 fix): gate makes ONE decision per
# (sample, channel) rather than 96 independent decisions across horizon.
# True per-sample selectivity, gate_std ≈ 0.35 (near Bernoulli max 0.5).
#
# G1 gate sees y_base.detach(): gate input is concat(h, y_base) so it can
# reason about "what base is going to predict" before deciding to fire.
# =============================================================================

exp:
  name: GI_MoE_ETTm1_pred_96
  out_dir: outputs/gi_moe_ETTm1
  seed: 2026
  device: cuda:0
data:
  csv_path: data/ETTm1.csv
  date_col: 0
  max_rows: 57600
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 336
  pred_len: 96
normalize:
  train_only: true       # leak-free; eval on test-data scale unseen by training
  global_zscore: true
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
model:
  hidden_dim: 256
  dropout: 0.2
train:
  epochs: 40
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  num_workers: 0

# v1 Adapter — parallel output residual form. Less effective than v2 on
# ETTm1 (test_mse ~0.32), kept for ablation comparison.
moe_loss:
  enable: true
  adapter_dim: 32
  lambda_pen: 0.1
  lambda_norm: 1.0e-4
  mae_weight: 0.3
  penalties: [delta, direction, trend]
  lambda_p: {delta: 1.0, direction: 1.0, trend: 1.0}
  jump_threshold: 2.0

# v2 Hidden-Block — internalized adapter form. Best mode here.
# Recommended mode: hidden_block_gi_moe_loss (0.297) or hidden_block_gi_bce_gate
# (0.298). Both within seed noise; gi_moe_loss is simpler / fewer hyperparams.
moe_loss_v2:
  enable: true
  shared_dim: 128             # unused since B1 fix (kept for cfg compat)
  private_dim: 32
  use_penalty_gated_activation: true
  mask_init: 0.0
  log_alpha_init: -3.0
  gate_init_bias: -2.0
  lambda_pen: 0.1
  lambda_norm: 1.0e-4
  lambda_mask: 1.0e-4
  mask_target: 0.5
  mae_weight: 0.3
  penalties: [delta, direction, trend]
  lambda_p: {delta: 1.0, direction: 1.0, trend: 1.0}
  jump_threshold: 2.0
  # BCE-improve gate supervision (used by mode hidden_block_gi_bce_gate only).
  lambda_gate: 0.5
  bce_tau: 0.01
  detach_gate_from_main: false
  # G3 bimodal entropy reg — empirically the single biggest single-knob gain.
  lambda_gate_bimodal: 0.01
  # Internal penalty EMA normalization — DEFAULT OFF.
  # Counterintuitively hurt performance: removed natural curriculum (penalty's
  # decreasing raw value as base improves provides automatic supervision ease).
  # Keep available for users who want to express importance ratios cleanly.
  normalize_penalties: false
