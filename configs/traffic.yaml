exp:
  name: traffic_H96_amp_dir_h192_l003_a06
  out_dir: outputs/traffic_H96_amp_dir_h192_l003_a06
  seed: 2026
  deterministic: true
  device: cuda:0

data:
  csv_path: data/traffic.csv
  date_col: 0
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  max_rows: 0

window:
  input_len: 96
  pred_len: 96

normalize:
  global_zscore: true
  train_only: true

corr:
  compute: true
  save_path: outputs/traffic_H96_amp_dir_h192_l003_a06/corr.npy

cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
  train_only: true

model:
  predictor: mlp
  hidden_dim: 192
  dropout: 0.2

moe:
  topk: 1
  enable: true
  freeze_lambda: false
  gate_hidden_dim: 32
  select_ranks: [1]
  detach_penalty_grad: false
  lambda_init:
    amp_under: 0.03
    delta: 0.03
    diff_amp: 0.03
    direction: 0.03
  dynamic_lambda:
    enable: false
    mode: multiscale
    hidden_dim: 32
    segment_bins: [4, 8]
    max_factor: 1.5
    mix: 0.6
    dropout: 0.0
    reg_weight: 1.0e-4
  learnable_lambda:
    enable: false
    reg_weight: 0.01
    share_floor: 0.05
    bilevel:
      enable: true
      optimize_gate: false
      outer_lr: 0.005
      inner_lr: 0.001
      val_metric: val_mse
      steps_per_epoch: 10
  gate_entropy_weight: 0.0
  gate_balance_weight: 0.0
  gate_route_on_penalty_only: true
  router_mode: learned
  router_penalty_context_weight: 0.0
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.2
  gate_noise_std: 0.2
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  lambda_min:
    amp_under: 0.0
    delta: 0.0
    diff_amp: 0.0
    direction: 0.0
  lambda_schedule:
    amp_under: none
    delta: none
    diff_amp: none
    direction: none
  gate_logit_clip: 5.0
  pred_side_residual:
    enable: false
    corrector_hidden: 16
    alpha_scale: 0.6
    selection_policy: val_mse_candidate_channel
penalties:
  enabled: [amp_under, delta, diff_amp, direction]
  jump_threshold: 0.6

train:
  epochs: 12
  batch_size: 4
  lr: 0.001
  mse_weight: 0.9
  mae_objective:
    enable: true
    kind: l1
    weight: 0.6
    warmup_epochs: 5
  selection_metric: val_mse
  weight_decay: 1.0e-4
  grad_clip: 1.0
  penalty_warmup_epochs: 5
  lr_scheduler:
    name: plateau
    factor: 0.5
    patience: 3
    min_lr: 1.0e-6

early_stop:
  patience: 5
  min_delta: 1.0e-6

plot:
  enable: false

portrait:
  enable: false
  out_dir: outputs/traffic_H96_amp_dir_h192_l003_a06/cluster_portraits

eval:
  skip_test: false

memory:
  enable: false
  save_checkpoint: false
  path: outputs/traffic_H96_amp_dir_h192_l003_a06/cluster_memory.pt
  checkpoint_path: outputs/traffic_H96_amp_dir_h192_l003_a06/best_checkpoint.pt
