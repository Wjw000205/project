exp:
  name: PEMS07_H48
  out_dir: outputs/PEMS07_H48
  seed: 2026
  deterministic: true
  device: cuda:0
data:
  csv_path: data/PEMS07.csv
  date_col: 0
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  max_rows: 0
window:
  input_len: 96
  pred_len: 48
  lazy: true
  past_context: true
normalize:
  global_zscore: true
  train_only: true
corr:
  compute: true
  save_path: outputs/PEMS07_H48/corr.npy
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
  train_only: true
model:
  predictor: context_channel_head_mlp
  hidden_dim: 192
  dropout: 0.0
  context_channel_head_blocks: 2
moe:
  topk: 1
  enable: true
  freeze_lambda: false
  gate_hidden_dim: 32
  select_ranks:
  - 1
  detach_penalty_grad: false
  lambda_init:
    amp_under: 0.0
    delta: 0.0
    diff_amp: 0.0
    direction: 0.0
  dynamic_lambda:
    enable: false
    mode: multiscale
    hidden_dim: 32
    segment_bins:
    - 4
    - 8
    max_factor: 1.5
    mix: 0.6
    dropout: 0.0
    reg_weight: 0.0001
  learnable_lambda:
    enable: false
    reg_weight: 0.01
    share_floor: 0.05
    bilevel:
      enable: true
      optimize_gate: false
      outer_lr: 0.005
      inner_lr: 0.001
      val_metric: val_mse
      steps_per_epoch: 10
  gate_entropy_weight: 0.0
  gate_balance_weight: 0.0
  gate_route_on_penalty_only: true
  router_mode: learned
  router_penalty_context_weight: 0.0
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.2
  gate_noise_std: 0.2
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  lambda_min:
    amp_under: 0.0
    delta: 0.0
    diff_amp: 0.0
    direction: 0.0
  lambda_schedule:
    amp_under: none
    delta: none
    diff_amp: none
    direction: none
  gate_logit_clip: 5.0
  pred_side_residual:
    enable: false
    corrector_hidden: 16
    alpha_scale: 0.6
    selection_policy: val_mse_candidate_channel
  freeze_backbone: true
  router_penalty_context_score: high_violation
penalties:
  enabled:
  - amp_under
  - delta
  - diff_amp
  - direction
  jump_threshold: 0.6
train:
  epochs: 36
  batch_size: 64
  lr: 0.001
  mse_weight: 0.5
  mae_objective:
    enable: true
    kind: l1
    weight: 1.5
    warmup_epochs: 3
  selection_metric: val_mae
  weight_decay: 0.0001
  grad_clip: 1.0
  penalty_warmup_epochs: 3
  lr_scheduler:
    name: plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-06
early_stop:
  patience: 4
  min_delta: 1.0e-06
plot:
  enable: false
portrait:
  enable: false
  out_dir: outputs/PEMS07_H48/cluster_portraits
eval:
  skip_test: false
memory:
  enable: false
  save_checkpoint: false
  path: outputs/PEMS07_H48/cluster_memory.pt
  checkpoint_path: outputs/PEMS07_H48/best_checkpoint.pt
finetune:
  enable: true
  checkpoint_path: F:\Python program\MoELoss - 20260401\outputs\pems_depth_rollout\runs\PEMS07_H48_hid192_b2\best_checkpoint.pt
  strict_window: true
  strict_model: true
  cluster_map: index
  load_model: true
  load_gate: false
  load_dynamic_lambda: false
  load_learnable_lambda: false
