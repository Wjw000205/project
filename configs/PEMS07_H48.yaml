exp:
  name: PEMS07_H48
  out_dir: outputs/PEMS07_H48
  seed: 2026
  deterministic: true
  device: cuda:0
data:
  csv_path: data/PEMS07.csv
  date_col: 0
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  max_rows: 0
window:
  input_len: 96
  pred_len: 48
  lazy: true
  past_context: true
normalize:
  global_zscore: true
  train_only: true
corr:
  compute: true
  save_path: outputs/PEMS07_H48/corr.npy
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
  train_only: true
model:
  predictor: context_channel_head_mlp
  hidden_dim: 192
  dropout: 0.0
  context_channel_head_blocks: 2
moe:
  enable: true
  shared_across_clusters: true
  topk: 2
  freeze_backbone: true
  freeze_lambda: false
  gate_hidden_dim: 96
  min_k_for_extensions: 3
  safeguard_hidden_dim: 64
  select_ranks:
  - 1
  detach_penalty_grad: false
  lambda_init:
    amp_under: 0.0
    delta: 0.0
    diff_amp: 0.0
    direction: 0.0
  lambda_min:
    amp_under: 0.0
    delta: 0.0
    diff_amp: 0.0
    direction: 0.0
  lambda_schedule:
    amp_under: none
    delta: none
    diff_amp: none
    direction: none
  pred_side_residual:
    enable: true
    train_with_eval_anchors: false
    feature_mode: safe_augmented
    residual_clip: 5.0
    corrector_hidden: 64
    init_alpha: -1.8
    alpha_scale: 1.5
    specialization_weight: 0.0
    norm_weight: 0.0
    use_y_base_input: true
    intervention_enable: false
    intervention_init: -2.0
    intervention_weight: 0.0
    detach_routed_penalty_pred: false
    selection_policy: none
    patch_router:
      enable: true
      patch_len: 12
      hidden_dim: 64
      topk: 1
      temperature: 1.0
      noise_std: 0.0
      allow_skip: true
      skip_init_bias: -2.0
      feature_clip: 8.0
      use_base_forecast: true
      regime_context:
        enable: true
        lengths:
        - 96
        - 288
        - 2016
      expected_mse_weight: 1.0
      oracle_ce_weight: 0.0
      oracle_ce_warmup_epochs: 0
      freeze_experts_after_warmup: true
      supervision_only: true
      oracle_min_abs_improvement: 0.0
      hierarchical_recall:
        enable: true
        adopt_threshold: 0.5
        adopt_init_bias: 0.0
        supervision_weight: 1.0
        warmup_epochs: 0
        min_abs_improvement: 0.0
        adoption_bce_weight: 0.0
        proposal_bce_weight: 0.0
        proposal_gain_listwise_weight: 1.0
        proposal_rescue_ce_weight: 1.0
        ranking_ce_weight: 0.0
        utility_regression_weight: 0.0
        risk_sign_bce_weight: 1.0
        risk_magnitude_weight: 0.0
        selected_utility_policy_weight: 0.0
        selected_adoption_bce_weight: 0.5
        selected_adoption_recall_weight: 0.0
        selected_false_adopt_weight: 0.0
        expert_conditional_risk:
          enable: true
          decoupled_encoder: true
          candidate_aware: true
          proposal_candidate_aware: true
          proposal_topk: 2
          proposal_rescue: true
          temperature: 0.25
          adoption_source: benefit_probability
          adopt_threshold: 0.5
          pairwise_rank:
            enable: true
            detach_features: false
            freeze_other_parameters: false
            temperature: 1.0
            loss_weight: 1.0
          lower_quantile:
            enable: false
            quantile: 0.2
            loss_weight: 0.0
        adoption_recall_weight: 0.0
        false_adopt_weight: 0.0
        penalty_recall_weight: 0.0
        false_penalty_weight: 0.0
        target_adopt_probability: 0.8
        false_adopt_max_probability: 0.2
        target_penalty_probability: 0.7
        false_penalty_max_probability: 0.3
    penalty_guard:
      enable: false
      metric: mse
      allow_multi: true
      min_abs_improvement: 0.0
      min_rel_improvement: 0.0
    channel_guard:
      enable: false
    validation_guard:
      enable: false
      select_fraction: 0.5
      min_abs_improvement: 0.0
      min_rel_improvement: 0.002
    diagnostics:
      enable: true
      train_oracle: true
  dynamic_lambda:
    enable: false
  learnable_lambda:
    enable: false
  gate_entropy_weight: 0.0
  gate_balance_weight: 0.0
  gate_route_on_penalty_only: false
  router_mode: learned
  router_penalty_context_weight: 0.0
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.0
  gate_noise_std: 0.2
  gate_init_bias:
    enable: true
    values:
      default: 0.0
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  residual_gate:
    enable: true
    alpha: 0.7
  pred_aware:
    enable: true
    use_pred_features: true
    use_penalty_input: false
  penalty_ema:
    enable: true
    decay: 0.9
  sigmoid_branch:
    enable: true
    gamma: 0.2
    init_bias: -2.0
  gate_logit_clip: 5.0
  router_penalty_context_score: high_violation
  gate_penalty_hit:
    enable: false
  mse_utility_gate_supervision:
    enable: false
    weight: 0.0
    temperature: 0.5
    min_gain: 0.0
    target_power: 1.0
  cluster_penalty_prior:
    enable: false
  train_stat_anchor_expert:
    enable: false
  train_residual_anchor_expert:
    enable: false
  channel_penalty_prior:
    enable: false
  explainability:
    enable: false
penalties:
  enabled:
  - amp_under
  - delta
  - diff_amp
  - direction
  jump_threshold: 0.6
train:
  epochs: 12
  batch_size: 64
  lr: 0.001
  mse_weight: 0.9
  selection_metric: val_mse
  weight_decay: 0.0001
  grad_clip: 1.0
  penalty_warmup_epochs: 0
  model_selection_start_epoch: 1
  fixed_shuffle_seed: true
  overfit_diagnostic:
    enable: false
  mae_objective:
    enable: false
    kind: l1
    weight: 0.3
    warmup_epochs: 5
  lr_scheduler:
    name: plateau
    factor: 0.5
    patience: 3
    min_lr: 1.0e-06
early_stop:
  patience: 12
  min_delta: 1.0e-06
plot:
  enable: false
portrait:
  enable: false
  out_dir: outputs/PEMS07_H48/cluster_portraits
eval:
  skip_test: false
memory:
  path: outputs/PEMS07_H48/cluster_memory.pt
  checkpoint_path: outputs/PEMS07_H48/best_checkpoint.pt
  enable: false
  save_checkpoint: true
finetune:
  enable: true
  checkpoint_path: outputs/shared_pkr_patch_gate_pems_matrix_20260711/runs/PEMS07/H48/shared_four_pkr_bank_ep6_valonly/best_checkpoint.pt
  strict_window: true
  strict_model: true
  strict_pred_residual: false
  cluster_map: index
  load_model: true
  load_gate: false
  load_pred_residual: true
  load_dynamic_lambda: false
  load_learnable_lambda: false
calendar_residual:
  enable: false
diagnostics:
  stage2_loss_audit:
    enable: true
