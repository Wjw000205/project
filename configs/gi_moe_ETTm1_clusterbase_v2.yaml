cluster:
  distance_threshold: 0.7
  linkage: average
  merge_small_clusters: true
  method: leader
  min_cluster_size: 2
  n_clusters: 3
  no_merge_if_channels_lt: 7
  random_state: 2026
data:
  csv_path: data/ETTm1.csv
  date_col: 0
  max_rows: 57600
  test_ratio: 0.2
  train_ratio: 0.6
  val_ratio: 0.2
exp:
  device: cuda:0
  name: GI_MoE_ETTm1_pred_96
  out_dir: outputs/gi_moe_ETTm1_clusterbase_v2
  seed: 2026
model:
  dropout: 0.2
  hidden_dim: 256
  predictor: cluster_mlp
moe_loss:
  adapter_dim: 32
  enable: true
  jump_threshold: 2.0
  lambda_norm: 0.0001
  lambda_p:
    delta: 1.0
    direction: 1.0
    trend: 1.0
  lambda_pen: 0.1
  mae_weight: 0.3
  penalties:
  - delta
  - direction
  - trend
moe_loss_v2:
  bce_tau: 0.01
  detach_gate_from_main: false
  enable: true
  gate_init_bias: -2.0
  jump_threshold: 2.0
  lambda_gate: 0.5
  lambda_gate_bimodal: 0.0
  lambda_mask: 0.0001
  lambda_norm: 0.0001
  lambda_p:
    delta: 1.0
    direction: 1.0
    trend: 1.0
  lambda_pen: 0.1
  log_alpha_init: -3.0
  mae_weight: 0.3
  mask_init: 0.0
  mask_target: 0.5
  normalize_penalties: false
  penalties:
  - delta
  - direction
  - trend
  private_dim: 32
  shared_dim: 128
  use_penalty_gated_activation: true
normalize:
  global_zscore: true
  train_only: true
train:
  batch_size: 64
  epochs: 40
  lr: 0.001
  num_workers: 0
  weight_decay: 0.0001
window:
  input_len: 336
  pred_len: 96
