exp:
  name: ETTm2_H720
  out_dir: outputs/ETTm2_H720
  seed: 2026
  deterministic: true
  device: cuda:0
data:
  csv_path: data/ETTm2.csv
  date_col: 0
  max_rows: 57600
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 96
  pred_len: 720
  past_context: true
normalize:
  global_zscore: true
  train_only: true
corr:
  compute: true
  save_path: outputs/ETTm2_H720/corr.npy
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
  train_only: true
  feature_aware:
    enable: true
    weight: 1.0
    acf_lags:
    - 1
    - 24
    - 96
  singleton_merge_strategy: pool
model:
  predictor: channel_head_mlp
  hidden_dim: 256
  dropout: 0.2
moe:
  enable: true
  topk: 1
  freeze_lambda: false
  gate_hidden_dim: 32
  select_ranks:
  - 1
  detach_penalty_grad: false
  lambda_init:
    trend: 0.07875
    direction: 0.1575
  lambda_min:
    trend: 0.0
    direction: 0.0
  lambda_schedule:
    trend: none
    direction: none
  pred_side_residual:
    enable: true
    feature_mode: legacy
    residual_clip: 0.0
    corrector_hidden: 32
    init_alpha: -3.0
    alpha_scale: 1.1
    specialization_weight: 0.1
    norm_weight: 0.0
    use_y_base_input: true
    intervention_enable: false
    intervention_init: -2.0
    intervention_weight: 0.001
    detach_routed_penalty_pred: false
    selection_policy: val_mse_gate
    selection_min_abs_improvement: 0.0
    selection_min_rel_improvement: 0.0
    gate_calibrator:
      loss: mse
      selection_metric: mse
      epochs: 30
      train_fraction: 0.7
      hidden_dim: 32
      batch_size: 256
      max_scale: 1.0
      init_scale: 0.4
      scale_reg: 0.0005
      scale_mode: sigmoid
      standardize_features: true
    penalty_selector_enable: true
    selector_temperature: 1.0
    selector_use_cluster_context: true
    fusion_gate_enable: true
    fusion_init: -1.5
    fusion_use_cluster_context: true
  dynamic_lambda:
    enable: true
    mode: multiscale
    hidden_dim: 32
    segment_bins:
    - 4
    - 8
    max_factor: 1.5
    mix: 0.6
    dropout: 0.0
    reg_weight: 0.0001
  learnable_lambda:
    enable: false
  gate_entropy_weight: 0.0
  gate_balance_weight: 0.0
  gate_route_on_penalty_only: true
  router_mode: learned
  router_penalty_context_weight: 0.0
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.0
  gate_noise_std: 0.2
  gate_init_bias:
    enable: true
    values:
      default: 0.0
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  gate_logit_clip: 5.0
  explainability:
    enable: true
    splits:
    - train
    - val
    - test
    max_batches: 0
  cluster_penalty_prior:
    enable: true
    topk: 1
    hard_topk: true
    temperature: 0.7
    smoothing: 0.0
    use_normalized_penalty: true
    logit_strength: 0.0
    use_as_balance_target: false
  channel_penalty_prior:
    enable: true
    topk: 1
    hard_topk: true
    temperature: 0.7
    smoothing: 0.0
    use_normalized_penalty: true
penalties:
  enabled:
  - trend
  - direction
  jump_threshold: 0.6
train:
  epochs: 100
  batch_size: 64
  lr: 0.001
  mse_weight: 0.9
  mae_objective:
    enable: true
    kind: l1
    weight: 0.6
    warmup_epochs: 5
  selection_metric: val_mse
  weight_decay: 0.001
  grad_clip: 1.0
  lr_scheduler:
    name: plateau
    factor: 0.5
    patience: 3
    min_lr: 1.0e-06
  penalty_warmup_epochs: 15
early_stop:
  patience: 10
  min_delta: 1.0e-06
plot:
  enable: false
portrait:
  enable: false
  out_dir: outputs/ETTm2_H720/cluster_portraits
  dpi: 140
  max_points: 2000
  jump_threshold: 0.6
knn_hybrid:
  enable: false
  mode: rolling
  scope: same_channel
  bank_split: history
  use_for_model_selection: false
  k: 96
  alpha: 1.8
  shape_bins: 24
  diff_bins: 12
  pred_shape_bins: 16
  pred_diff_bins: 8
  feature_mode: joint
  template_mode: residual
  adaptive_alpha: confidence
  confidence_floor: 0.0
  distance_sharpness: 1.0
  selection_policy: val_mae_guarded
  selection_min_rel_improvement: 0.0
  selection_max_rel_mse_regression: 0.03
  bank_stride: 2
  distance_weight: inverse
  anchor_mode: last
  bank_chunk_size: 8192
  path: outputs/ETTm2_H720/knn_shape_bank.pt
eval:
  skip_test: false
calibration:
  enable: false
memory:
  enable: false
  save_checkpoint: false
  path: outputs/ETTm2_H720/cluster_memory.pt
  checkpoint_path: outputs/ETTm2_H720/best_checkpoint.pt
