exp:
  name: ETTm2_H96
  out_dir: outputs/ETTm2_H96
  seed: 2026
  deterministic: true
  device: cuda:0
data:
  csv_path: data/ETTm2.csv
  date_col: 0
  max_rows: 57600
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 96
  pred_len: 96
  past_context: true
normalize:
  global_zscore: true
  train_only: true
corr:
  compute: true
  save_path: outputs/ETTm2_H96/corr.npy
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
  train_only: true
model:
  predictor: channel_head_mlp
  hidden_dim: 256
  dropout: 0.0
  channel_head_residual: true
moe:
  enable: true
  topk: 2
  freeze_lambda: false
  gate_hidden_dim: 32
  select_ranks:
  - 1
  detach_penalty_grad: false
  lambda_init:
    trend: 0.0
    direction: 0.0
  lambda_min:
    trend: 0.0
    direction: 0.0
  lambda_schedule:
    trend: none
    direction: none
  pred_side_residual:
    enable: true
    feature_mode: legacy
    residual_clip: 0.0
    corrector_hidden: 32
    init_alpha: -3.0
    alpha_scale: 1.1
    specialization_weight: 0.1
    norm_weight: 0.0
    use_y_base_input: true
    intervention_enable: false
    intervention_init: -2.0
    intervention_weight: 0.001
    detach_routed_penalty_pred: false
    selection_policy: val_mse_candidate_channel_guarded
    selection_min_abs_improvement: 0.0
    selection_min_rel_improvement: 0.0
  dynamic_lambda:
    enable: false
  learnable_lambda:
    enable: false
  gate_entropy_weight: 0.0
  gate_balance_weight: 0.0
  gate_route_on_penalty_only: false
  router_mode: learned
  router_penalty_context_weight: 0.0
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.0
  gate_noise_std: 0.2
  gate_init_bias:
    enable: true
    values:
      default: 0.0
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  gate_logit_clip: 5.0
  freeze_backbone: true
  router_penalty_context_score: high_violation
  gate_penalty_hit:
    enable: false
  mse_utility_gate_supervision:
    enable: true
    weight: 0.02
    temperature: 0.5
    min_gain: 0.0
    target_power: 1.0
  cluster_penalty_prior:
    enable: true
    topk: 2
    hard_topk: true
    logit_strength: 0.4
    temperature: 1.0
    smoothing: 0.02
    use_normalized_penalty: true
    use_as_balance_target: false
  channel_penalty_prior:
    enable: false
    topk: 0
    hard_topk: true
    temperature: 1.0
    smoothing: 0.02
    use_normalized_penalty: true
  explainability:
    enable: false
    splits:
    - val
    - test
    max_batches: 0
penalties:
  enabled:
  - trend
  - direction
  jump_threshold: 0.6
train:
  epochs: 20
  batch_size: 64
  lr: 0.001
  mse_weight: 0.9
  mae_objective:
    enable: true
    kind: l1
    weight: 0.6
    warmup_epochs: 5
  selection_metric: val_mse
  weight_decay: 0.001
  grad_clip: 1.0
  lr_scheduler:
    name: plateau
    factor: 0.5
    patience: 3
    min_lr: 1.0e-06
    warmup_epochs: 0
  penalty_warmup_epochs: 0
  lr_warmup_epochs: 0
  model_selection_start_epoch: 1
early_stop:
  patience: 5
  min_delta: 1.0e-06
plot:
  enable: false
  random_n: 3
  dpi: 140
portrait:
  enable: false
  out_dir: outputs/ETTm2_H96/cluster_portraits
  dpi: 140
  max_points: 2000
  jump_threshold: 0.6
eval:
  skip_test: false
memory:
  enable: false
  save_checkpoint: true
  path: outputs/ETTm2_H96/cluster_memory.pt
  checkpoint_path: outputs/ETTm2_H96/best_checkpoint.pt
finetune:
  enable: true
  checkpoint_path: outputs/fresh_input_len96_20260610_ettm2_backbone_lowdrop/runs/ETTm2/H96/common_backbone_h96/channel_h256_do0_wd1e3_mae06/best_checkpoint.pt
  strict_window: true
  strict_model: true
  cluster_map: index
  load_model: true
  load_gate: false
  load_dynamic_lambda: false
  load_learnable_lambda: false
calendar_residual:
  enable: false
