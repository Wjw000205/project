exp:
  name: "ETTm2_to_traffic"
  out_dir: "outputs/ETTm2ToTraffic"
  seed: 2026
  device: "cuda:0"

source:
  memory_path: "outputs/ettm2_h96_src_transfer_no_leak/source/cluster_memory.pt"
  checkpoint_path: "outputs/ett_global_h96_param_base/runs/ETTm2/pred_96/best_checkpoint.pt"
  summary_path: "outputs/ett_global_h96_param_base/runs/ETTm2/pred_96/run_summary.json"
  csv_path: "data/ETTm2.csv"
  date_col: 0
  step_minutes: 15

data:
  csv_path: "data/traffic.csv"
  date_col: 0
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

window:
  input_len: 336
  pred_len: 96

normalize:
  global_zscore: true
  train_only: true

transfer:
  corr_mode: "cycle_template"
  route_fit_scope: "train"
  use_pred_residual: true
  phase_bins: 48
  phase_max_shift: 32
  period_min: null
  period_max: null
  period_min_hours: 12
  period_max_hours: 168
  corr_align: "head"
  corr_threshold: 0.85
  fallback_mode: "soft"
  fallback_topk: 2
  fallback_temp: 0.7
  resample:
    enable: true
    target_step_minutes: 15
    method: "linear"
  knn_hybrid:
    enable: false
    scope: "same_cluster"
    bank_split: "train"
    use_for_model_selection: false
    k: 16
    alpha: 0.1
    adaptive_alpha: "confidence"
    confidence_floor: 0.0
    distance_sharpness: 1.0
    shape_bins: 24
    diff_bins: 12
    bank_stride: 4
    distance_weight: "inverse"
    anchor_mode: "last"
  save_corr: true

eval:
  batch_size: 16
