exp:
  name: "ETTm2_to_ETTm1"
  out_dir: "outputs/ETTm2ToETTm1"
  seed: 2026
  device: "cuda:0"

source:
  memory_path: "outputs/ettm2_h96_src_transfer_no_leak/source/cluster_memory.pt"
  checkpoint_path: "outputs/ett_global_h96_param_base/runs/ETTm2/pred_96/best_checkpoint.pt"
  summary_path: "outputs/ett_global_h96_param_base/runs/ETTm2/pred_96/run_summary.json"
  csv_path: "data/ETTm2.csv"
  date_col: 0
  step_minutes: 15

data:
  csv_path: "data/ETTm1.csv"
  date_col: 0
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

window:
  input_len: 96
  pred_len: 96

normalize:
  global_zscore: true
  train_only: true

transfer:
  corr_mode: "cycle_template"
  route_fit_scope: "train"
  use_pred_residual: true
  phase_bins: 64
  phase_max_shift: null
  period_min: null
  period_max: null
  period_min_hours: 12
  period_max_hours: 168
  corr_align: "head"
  corr_threshold: null
  fallback_mode: "hard"
  fallback_topk: 2
  fallback_temp: 1.0
  resample:
    enable: false
    target_step_minutes: 15
    method: "linear"
  save_corr: true

eval:
  batch_size: 64
