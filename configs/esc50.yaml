exp:
  name: esc50_pred_192
  out_dir: outputs/esc50_mfcc
  seed: 2026
  deterministic: true
  device: cuda:0
data:
  csv_path: data/esc50_mfcc.csv
  date_col: 0
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
window:
  input_len: 96
  pred_len: 192
normalize:
  global_zscore: true
  train_only: false
corr:
  compute: true
  save_path: outputs/esc50_mfcc/corr.npy
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
model:
  predictor: mlp
  hidden_dim: 256
  dropout: 0.2
moe:
  topk: 1
  enable: true
  freeze_lambda: false
  gate_hidden_dim: 128
  select_ranks:
  - 1
  detach_penalty_grad: false
  lambda_init:
    jump: 0.1
    smooth: 0.1
    level: 0.1
    delta: 0.1
  dynamic_lambda:
    enable: true
    mode: multiscale
    hidden_dim: 32
    segment_bins:
    - 4
    - 8
    max_factor: 1.5
    mix: 0.6
    dropout: 0.0
    reg_weight: 0.0001
  learnable_lambda:
    enable: false
    reg_weight: 0.01
    share_floor: 0.05
    bilevel:
      enable: true
      optimize_gate: false
      outer_lr: 0.005
      inner_lr: 0.001
      val_metric: val_mse
      steps_per_epoch: 10
  gate_entropy_weight: 0.02
  gate_balance_weight: 0.01
  gate_route_on_penalty_only: true
  router_mode: penalty_context
  router_penalty_context_weight: 1.1
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.2
  gate_noise_std: 0.2
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  lambda_min:
    amp: 0.0
    jitter: 0.0
    jump: 0.0
    smooth: 0.0
    level: 0.0
    delta: 0.0
  lambda_schedule:
    amp: none
    jitter: none
    jump: none
    smooth: none
    level: none
    delta: none
  gate_logit_clip: 5.0
penalties:
  enabled:
  - jump
  - smooth
  - level
  - delta
  jump_threshold: 0.6
train:
  epochs: 100
  batch_size: 64
  lr: 0.001
  mse_weight: 0.9
  selection_metric: val_mse
  weight_decay: 0.0001
  grad_clip: 1.0
  lr_scheduler:
    name: plateau
    factor: 0.5
    patience: 3
    min_lr: 1.0e-06
  penalty_warmup_epochs: 15
early_stop:
  patience: 10
  min_delta: 1.0e-06
plot:
  enable: true
  random_n: 3
  dpi: 140
portrait:
  enable: true
  out_dir: outputs/esc50_mfcc/cluster_portraits
  dpi: 140
  max_points: 2000
  jump_threshold: 0.6
