exp:
  name: ETTh1_pred_96_paper_norm
  out_dir: outputs/ETTh1_96_paper_norm_standard_dlinear_past_context
  seed: 2026
  deterministic: true
  device: cuda:0
data:
  csv_path: data/ETTh1.csv
  date_col: 0
  max_rows: 14400
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 96
  pred_len: 96
  past_context: true
normalize:
  global_zscore: true
  train_only: false
corr:
  compute: true
  save_path: outputs/ETTh1_96_paper_norm_standard_dlinear_past_context/corr.npy
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
model:
  predictor: dlinear
  hidden_dim: 128
  dropout: 0.0
  dlinear_kernel_size: 25
  channel_adapter:
    enable: false
    rank: 8
    init: zero_delta
    scale: 1.0
moe:
  topk: 1
  enable: true
  freeze_lambda: false
  gate_hidden_dim: 64
  select_ranks:
  - 1
  detach_penalty_grad: false
  lambda_init:
    jump: 0.1
    amp_under: 0.1
    level: 0.1
    delta: 0.1
  dynamic_lambda:
    enable: true
    mode: multiscale
    hidden_dim: 24
    segment_bins:
    - 4
    - 8
    max_factor: 1.5
    mix: 0.6
    dropout: 0.0
    reg_weight: 0.0001
  learnable_lambda:
    enable: false
    reg_weight: 0.01
    share_floor: 0.05
    bilevel:
      enable: true
      optimize_gate: false
      outer_lr: 0.005
      inner_lr: 0.001
      val_metric: val_mse
      steps_per_epoch: 10
  gate_entropy_weight: 0.02
  gate_balance_weight: 0.01
  gate_route_on_penalty_only: true
  router_mode: penalty_context
  router_penalty_context_weight: 1.1
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.2
  gate_noise_std: 0.2
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  lambda_min:
    amp: 0.0
    jitter: 0.0
    jump: 0.0
    amp_under: 0.0
    level: 0.0
    delta: 0.0
  lambda_schedule:
    amp: none
    jitter: none
    jump: none
    amp_under: none
    level: none
    delta: none
  gate_logit_clip: 5.0
penalties:
  enabled:
  - jump
  - amp_under
  - level
  - delta
  jump_threshold: 0.6
train:
  epochs: 100
  batch_size: 64
  lr: 0.001
  mse_weight: 0.9
  selection_metric: val_mse
  weight_decay: 0.0002
  grad_clip: 1.0
  lr_scheduler:
    name: plateau
    factor: 0.5
    patience: 3
    min_lr: 1.0e-06
  penalty_warmup_epochs: 15
early_stop:
  patience: 10
  min_delta: 1.0e-06
plot:
  enable: false
  random_n: 3
  dpi: 140
portrait:
  enable: false
  out_dir: outputs/ETTh1_96_paper_norm_standard_dlinear_past_context/cluster_portraits
  dpi: 140
  max_points: 2000
  jump_threshold: 0.6
knn_hybrid:
  enable: true
  mode: rolling
  scope: same_cluster
  bank_split: history
  use_for_model_selection: false
  k: 512
  alpha: 1.8
  alpha_horizon_ref: 96
  alpha_horizon_power: 0.0
  shape_bins: 24
  diff_bins: 12
  pred_shape_bins: 16
  pred_diff_bins: 8
  feature_mode: joint
  template_mode: residual
  adaptive_alpha: none
  confidence_floor: 0.0
  distance_sharpness: 1.0
  selection_policy: val_mse_margin
  selection_min_rel_improvement: 0.0
  bank_stride: 1
  distance_weight: inverse
  anchor_mode: last
  bank_chunk_size: 8192
  path: outputs/ETTh1_96_paper_norm_standard_dlinear_past_context/knn_shape_bank.pt
memory:
  path: outputs/ETTh1_96_paper_norm_standard_dlinear_past_context/cluster_memory.pt
  checkpoint_path: outputs/ETTh1_96_paper_norm_standard_dlinear_past_context/best_checkpoint.pt
  enable: false
  save_checkpoint: false
