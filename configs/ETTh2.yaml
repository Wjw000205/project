exp:
  name: ETTh2_96_mlp_moe_best
  out_dir: outputs/ETTh2_96_mlp_moe_best
  seed: 2026
  deterministic: true
  device: cuda:0
data:
  csv_path: data/ETTh2.csv
  date_col: 0
  max_rows: 14400
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 96
  pred_len: 96
  past_context: true
normalize:
  global_zscore: true
  train_only: true
corr:
  compute: true
  save_path: outputs/ETTh2_96_mlp_moe_best/corr.npy
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
  train_only: true
model:
  predictor: mlp
  hidden_dim: 256
  dropout: 0.2
moe:
  topk: 1
  enable: true
  freeze_lambda: false
  gate_hidden_dim: 32
  select_ranks:
  - 1
  detach_penalty_grad: false
  lambda_init:
    jump: 0.15
    amp_under: 0.15
    level: 0.15
    delta: 0.15
  pred_side_residual:
    enable: true
    corrector_hidden: 32
    init_alpha: -3.0
    alpha_scale: 1.6
    specialization_weight: 0.1
    norm_weight: 0.0
    use_y_base_input: true
    intervention_enable: false
    intervention_init: -2.0
    intervention_weight: 0.001
    detach_routed_penalty_pred: false
    selection_min_abs_improvement: 0.0
    selection_min_rel_improvement: 0.0
    penalty_guard:
      enable: false
      metric: mse
      allow_multi: true
      min_abs_improvement: 0.0
      min_rel_improvement: 0.0
    channel_guard:
      enable: false
    validation_guard:
      enable: false
      select_fraction: 0.5
      min_abs_improvement: 0.0
      min_rel_improvement: 0.002
    diagnostics:
      enable: true
    feature_mode: legacy
    residual_clip: 0.0
    selection_policy: val_mse_candidate_channel
  dynamic_lambda:
    enable: true
    mode: multiscale
    hidden_dim: 32
    segment_bins:
    - 4
    - 8
    max_factor: 1.5
    mix: 0.6
    dropout: 0.0
    reg_weight: 0.0001
  learnable_lambda:
    enable: false
  gate_entropy_weight: 0.0
  gate_balance_weight: 0.0
  gate_route_on_penalty_only: true
  router_mode: learned
  router_penalty_context_weight: 0.0
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.0
  gate_noise_std: 0.2
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  lambda_min:
    jump: 0.0
    amp_under: 0.0
    level: 0.0
    delta: 0.0
  lambda_schedule:
    jump: none
    amp_under: none
    level: none
    delta: none
  gate_logit_clip: 5.0
  gate_init_bias:
    enable: true
    values:
      default: 0.0
penalties:
  enabled:
  - jump
  - amp_under
  - level
  - delta
  jump_threshold: 0.6
train:
  epochs: 100
  batch_size: 64
  lr: 0.001
  mse_weight: 0.9
  mae_objective:
    enable: true
    kind: l1
    weight: 0.4
    warmup_epochs: 5
  selection_metric: val_mse
  weight_decay: 0.001
  grad_clip: 1.0
  shuffle_seed: 2026
  loss_normalization:
    enable: true
    mode: std
    eps: 0.001
    terms:
    - mse
    - mae_objective
    - penalty
    - pred_residual
  lr_scheduler:
    name: cosine
    t_max: 95
    min_lr: 1.0e-06
    warmup_epochs: 5
    warmup_start_factor: 0.2
  penalty_warmup_epochs: 15
  swa:
    enable: true
    start_epoch: 15
    update_every: 1
    selection_metric: val_mse
    min_delta: 0.0
early_stop:
  patience: 10
  min_delta: 1.0e-06
plot:
  enable: false
  random_n: 3
  dpi: 140
portrait:
  enable: false
  out_dir: outputs/ETTh2_96_mlp_moe_best/cluster_portraits
  dpi: 140
  max_points: 2000
  jump_threshold: 0.6
eval:
  skip_test: false
memory:
  enable: false
  save_checkpoint: false
  path: outputs/ETTh2_96_mlp_moe_best/cluster_memory.pt
  checkpoint_path: outputs/ETTh2_96_mlp_moe_best/best_checkpoint.pt
