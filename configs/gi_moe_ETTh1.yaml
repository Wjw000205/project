exp:
  name: GI_MoE_ETTh1_pred_720
  out_dir: outputs/gi_moe_ETTh1
  seed: 2026
  device: cuda:0
data:
  csv_path: data/ETTh1.csv
  date_col: 0
  max_rows: 14400
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 336
  pred_len: 720
normalize:
  train_only: true
  global_zscore: true
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
model:
  hidden_dim: 256
  dropout: 0.2
train:
  epochs: 40
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  num_workers: 0
moe_loss:
  enable: true
  mode: gi_moe_loss
  adapter_dim: 8           # LoRA rank
  gate_init_bias: -2.0
  lambda_pen: 0.1
  lambda_norm: 1.0e-3
  lambda_r: 1.0e-3
  mae_weight: 0.3
  penalties: [amp_under, delta, jitter, smooth]
  lambda_p:
    amp_under: 1.0
    delta: 1.0
    jitter: 1.0
    smooth: 1.0
  jump_threshold: 2.0
