exp:
  name: GI_MoE_ETTm1_directional
  out_dir: outputs/gi_moe_ETTm1_directional
  seed: 2026
  device: cuda:0
data:
  csv_path: data/ETTm1.csv
  date_col: 0
  max_rows: 57600
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 336
  pred_len: 96
normalize:
  train_only: true
  global_zscore: true
model:
  hidden_dim: 256
  dropout: 0.2
train:
  epochs: 40
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  num_workers: 0

# Data-driven penalty pool — chosen by per-cluster rel_gap probe:
#   delta      rel_gap=0.89/0.98/1.00 across 3 clusters
#   direction  rel_gap=0.87/0.98/0.99
#   trend      rel_gap=0.82/0.92/0.80
# All three are "match-truth" penalties; base is structurally failing at
# first-difference / direction-of-motion / trend matching.
moe_loss:
  enable: true
  adapter_dim: 32
  lambda_pen: 0.1
  lambda_norm: 1.0e-4
  mae_weight: 0.3
  penalties: [delta, direction, trend]
  lambda_p: {delta: 1.0, direction: 1.0, trend: 1.0}
  jump_threshold: 2.0

moe_loss_v2:
  enable: true
  shared_dim: 128
  private_dim: 32
  use_penalty_gated_activation: true
  mask_init: 0.0
  log_alpha_init: -3.0
  gate_init_bias: -2.0
  lambda_pen: 0.1
  lambda_norm: 1.0e-4
  lambda_mask: 1.0e-4
  mask_target: 0.5
  mae_weight: 0.3
  penalties: [delta, direction, trend]
  lambda_p: {delta: 1.0, direction: 1.0, trend: 1.0}
  jump_threshold: 2.0
  # BCE-improve gate supervision (used by mode hidden_block_gi_bce_gate):
  #   improve_p(b,c) = MSE(y_base, y) - MSE(y_base + α·r_p, y)
  #   q_p            = sigmoid(improve_p / bce_tau).detach()
  #   L_gate_p       = BCE(gate_p.mean_over_H, q_p)
  lambda_gate: 0.5
  bce_tau: 0.01
  detach_gate_from_main: false  # MSE + BCE jointly supervise gate (B0 form: best on ETTm1)
  # G3: bimodal entropy reg pushes per-sample gate toward 0 or 1 (decisive routing).
  lambda_gate_bimodal: 0.01
