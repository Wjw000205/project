exp:
  name: GI_MoE_ETTh1_directional
  out_dir: outputs/gi_moe_ETTh1_directional
  seed: 2026
  device: cuda:0
data:
  csv_path: data/ETTh1.csv
  date_col: 0
  max_rows: 14400
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 336
  pred_len: 720
normalize:
  train_only: true
  global_zscore: true
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
model:
  hidden_dim: 256
  dropout: 0.2
train:
  epochs: 40
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  num_workers: 0

# Data-driven penalty pool — chosen by ETTh1 per-cluster rel_gap probe.
# trend has rel_gap 1.08/0.97/0.84 — base is even worse than last-value
# on trend in cluster 0. Massive room.
moe_loss:
  enable: true
  adapter_dim: 32
  lambda_pen: 0.1
  lambda_norm: 1.0e-4
  mae_weight: 0.3
  penalties: [delta, direction, trend]
  lambda_p: {delta: 1.0, direction: 1.0, trend: 1.0}
  jump_threshold: 2.0

moe_loss_v2:
  enable: true
  shared_dim: 128
  private_dim: 32
  use_penalty_gated_activation: true
  mask_init: 0.0
  log_alpha_init: -3.0
  gate_init_bias: -2.0
  lambda_pen: 0.1
  lambda_norm: 1.0e-4
  lambda_mask: 1.0e-4
  mask_target: 0.5
  mae_weight: 0.3
  penalties: [delta, direction, trend]
  lambda_p: {delta: 1.0, direction: 1.0, trend: 1.0}
  jump_threshold: 2.0
  # BCE-improve gate supervision (B0 form: BCE + MSE both supervise gate,
  # which was the best-performing variant on ETTm1).
  lambda_gate: 0.5
  bce_tau: 0.01
  detach_gate_from_main: false
