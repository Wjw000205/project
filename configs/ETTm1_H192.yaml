exp:
  name: ETTm1_H192
  out_dir: outputs/ETTm1_H192
  seed: 2026
  deterministic: true
  device: cuda:0
data:
  csv_path: data/ETTm1.csv
  date_col: 0
  max_rows: 57600
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
window:
  input_len: 96
  pred_len: 192
  past_context: true
normalize:
  train_only: true
  global_zscore: true
corr:
  compute: true
  save_path: outputs/ETTm1_H192/corr.npy
cluster:
  method: leader
  n_clusters: 3
  distance_threshold: 0.7
  linkage: average
  kmeans_n_init: 10
  kmeans_max_iter: 300
  spectral_affinity: corr
  rbf_gamma: 1.0
  dbscan_eps: 0.7
  dbscan_min_samples: 2
  random_state: 2026
  min_cluster_size: 2
  merge_small_clusters: true
  no_merge_if_channels_lt: 7
  train_only: true
model:
  predictor: context_channel_head_mlp
  hidden_dim: 192
  dropout: 0.1
  mlp_residual_anchor: true
  temporal_basis_adapter:
    enable: true
    rank: 8
    scale: 0.1
    init: zero_delta
  context_channel_head_residual: true
  context_channel_head_include_delta: true
moe:
  enable: true
  topk: 2
  freeze_lambda: false
  gate_hidden_dim: 32
  min_k_for_extensions: 3
  safeguard_hidden_dim: 64
  select_ranks:
  - 1
  detach_penalty_grad: false
  lambda_init:
    level: 0.0
    delta: 0.0
    d2_match: 0.0
    diff_amp: 0.0
  lambda_min:
    level: 0.0
    delta: 0.0
    d2_match: 0.0
    diff_amp: 0.0
  lambda_schedule:
    level: none
    delta: none
    d2_match: none
    diff_amp: none
  pred_side_residual:
    enable: true
    feature_mode: legacy
    residual_clip: 0.0
    corrector_hidden: 32
    init_alpha: -3.0
    alpha_scale: 1.1
    specialization_weight: 0.1
    norm_weight: 0.0
    use_y_base_input: true
    intervention_enable: false
    intervention_init: -2.0
    intervention_weight: 0.001
    detach_routed_penalty_pred: false
    selection_policy: val_mse_candidate_channel_guarded
    selection_min_abs_improvement: 0.0
    selection_min_rel_improvement: 0.0
    penalty_guard:
      enable: false
      metric: mse
      allow_multi: true
      min_abs_improvement: 0.0
      min_rel_improvement: 0.0
    channel_guard:
      enable: false
    validation_guard:
      enable: false
      select_fraction: 0.5
      min_abs_improvement: 0.0
      min_rel_improvement: 0.002
    diagnostics:
      enable: true
  dynamic_lambda:
    enable: false
  learnable_lambda:
    enable: false
  gate_entropy_weight: 0.0
  gate_balance_weight: 0.0
  gate_route_on_penalty_only: false
  router_mode: learned
  router_penalty_context_weight: 0.0
  router_detach_penalty_context: true
  allow_skip: true
  skip_cost: 0.15
  skip_init_bias: -2.0
  gate_temperature: 1.0
  gate_noise_std: 0.2
  gate_init_bias:
    enable: true
    values:
      level: 2.0
      default: 0.0
  gate_soft_weight: 0.0
  gate_prob_floor: 0.0
  gate_entropy_target_frac: 0.7
  residual_gate:
    enable: true
    alpha: 0.7
  pred_aware:
    enable: true
    use_pred_features: true
    use_penalty_input: false
  penalty_ema:
    enable: true
    decay: 0.9
  sigmoid_branch:
    enable: true
    gamma: 0.2
    init_bias: -2.0
  gate_logit_clip: 5.0
  freeze_backbone: true
  router_penalty_context_score: high_violation
  gate_penalty_hit:
    enable: false
  mse_utility_gate_supervision:
    enable: true
    weight: 0.02
    temperature: 0.5
    min_gain: 0.0
    target_power: 1.0
  cluster_penalty_prior:
    enable: true
    topk: 0
    hard_topk: true
    logit_strength: 0.3
    temperature: 1.0
    smoothing: 0.02
    use_normalized_penalty: true
    use_as_balance_target: false
  channel_penalty_prior:
    enable: true
    topk: 2
    hard_topk: true
    temperature: 1.0
    smoothing: 0.02
    use_normalized_penalty: true
  explainability:
    enable: false
    splits:
    - val
    - test
    max_batches: 0
penalties:
  enabled:
  - level
  - delta
  - d2_match
  - diff_amp
  jump_threshold: 0.6
train:
  epochs: 1
  batch_size: 64
  lr: 0.001
  mse_weight: 0.9
  selection_metric: val_mse
  weight_decay: 0.0001
  grad_clip: 1.0
  penalty_warmup_epochs: 10
  mae_objective:
    enable: true
    kind: l1
    weight: 0.6
    warmup_epochs: 5
  lr_scheduler:
    name: plateau
    factor: 0.5
    patience: 3
    min_lr: 1.0e-06
early_stop:
  patience: 10
  min_delta: 1.0e-06
eval:
  skip_test: false
plot:
  enable: false
portrait:
  out_dir: outputs/ETTm1_H192/cluster_portraits
  enable: false
memory:
  path: outputs/ETTm1_H192/cluster_memory.pt
  checkpoint_path: outputs/ETTm1_H192/best_checkpoint.pt
  enable: false
  save_checkpoint: false
finetune:
  enable: true
  checkpoint_path: outputs/fresh_input_len96_20260614_ettm1_h192_mlp_backbone_arch_probe/runs/cch_h192_do010_basis_r8/best_checkpoint.pt
  strict_window: true
  strict_model: true
  cluster_map: index
  load_model: true
  load_gate: false
  load_dynamic_lambda: false
  load_learnable_lambda: false
calendar_residual:
  enable: false
